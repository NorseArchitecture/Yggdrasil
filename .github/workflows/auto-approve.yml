name: Auto-approve platform PRs

on:
  pull_request:
    types: [opened, synchronize]
    branches: [master]

jobs:
  auto-approve:
    if: |
      github.head_ref == 'sync/platform-config' ||
      startsWith(github.head_ref, 'update/cpm/')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Approve
        run: gh pr review ${{ github.event.pull_request.number }} --approve --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
